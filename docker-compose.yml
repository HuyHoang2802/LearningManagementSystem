version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lms-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network

  identity-service:
    build:
      context: .
      dockerfile: PRN232.LMS.Identity.API/Dockerfile
    container_name: identity-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Secret: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      Jwt__Issuer: LmsIdentityService
      Jwt__Audience: LmsClients
      ConnectionStrings__DBDefault: Host=postgres; Port=5432; Database=lms_identity_db; Username=postgres; Password=12345
    ports:
      - "5001:8080"
    networks:
      - lms-network

  student-service:
    build:
      context: .
      dockerfile: PRN232.LMS.Student.API/Dockerfile
    container_name: student-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Secret: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      Jwt__Issuer: LmsIdentityService
      Jwt__Audience: LmsClients
      ConnectionStrings__DBDefault: Host=postgres; Port=5432; Database=lms_student_db; Username=postgres; Password=12345
    ports:
      - "5002:8080"
      - "5082:8081"
    networks:
      - lms-network

  course-service:
    build:
      context: .
      dockerfile: PRN232.LMS.Course.API/Dockerfile
    container_name: course-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      student-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Secret: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      Jwt__Issuer: LmsIdentityService
      Jwt__Audience: LmsClients
      ConnectionStrings__DBDefault: Host=postgres; Port=5432; Database=lms_course_db; Username=postgres; Password=12345
      GrpcSettings__StudentServiceUrl: http://student-service:8081
    ports:
      - "5003:8080"
    networks:
      - lms-network

  api-gateway:
    build:
      context: .
      dockerfile: PRN232.LMS.APIGateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - identity-service
      - student-service
      - course-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Secret: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30
      Jwt__Issuer: LmsIdentityService
      Jwt__Audience: LmsClients
      ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address: http://identity-service:8080
      ReverseProxy__Clusters__student-cluster__Destinations__destination1__Address: http://student-service:8080
      ReverseProxy__Clusters__course-cluster__Destinations__destination1__Address: http://course-service:8080
    ports:
      - "5000:8080"
    networks:
      - lms-network

volumes:
  pgdata:

networks:
  lms-network:
    driver: bridge
